name: CI + Dependabot auto-merge

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      # Install passed above; only then consider merging a Dependabot PR.
      - name: Dependabot metadata
        if: github.actor == 'dependabot[bot]'
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Auto-merge non-major Dependabot PR
        if: github.actor == 'dependabot[bot]' && steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
